{% extends "base.html" %}
{% block extra_head %}
<meta name="author" content="{{ page.author if page.author else site_author }}">
<meta property="og:site_name" content="{{ site_title }}">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:url" content="{{ site_url }}{{ canonical_path }}">
<meta property="og:description" content="{{ page.description }}">
<meta property="og:type" content="article">
{% if page.date_iso %}
<meta property="article:published_time" content="{{ page.date_iso }}">
{% endif %}
{% if page.tags %}
{% for tag in page.tags %}
<meta property="article:tag" content="{{ tag }}">
{% endfor %}
{% endif %}
{% endblock %}
{% block content %}
<article class="post-text storypage" itemscope="itemscope" itemtype="http://schema.org/Article">
  <header>
    <h1 class="p-name entry-title" itemprop="headline name"><a href="." class="u-url">{{ page.title }}</a></h1>
  </header>
  <div class="e-content entry-content" itemprop="articleBody text">
{{ page.content }}
  </div>
</article>
{% endblock %}
